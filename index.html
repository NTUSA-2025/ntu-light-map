<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台大夜間亮度地圖</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral:       #D85A30;
      --coral-light: #F0997B;
      --coral-dim:   rgba(216,90,48,0.15);
      --bg-shell:    #08101e;
      --bg-panel:    #0c1628;
      --bg-card:     rgba(255,255,255,0.04);
      --border:      rgba(255,255,255,0.07);
      --text-hi:     rgba(255,255,255,0.88);
      --text-mid:    rgba(255,255,255,0.50);
      --text-lo:     rgba(255,255,255,0.28);
      --dock-w:      52px;
      --panel-w:     280px;
    }

    html, body {
      height: 100%;
      background: var(--bg-shell);
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
    }

    #shell {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #dock {
      width: var(--dock-w);
      background: var(--bg-panel);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 2px;
      flex-shrink: 0;
      z-index: 500;
    }

    .dock-logo {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: var(--coral);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .dock-logo svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; }

    .dock-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-mid);
      font-size: 17px;
      border: none;
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .dock-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-hi); }
    .dock-btn.active { background: var(--coral-dim); color: var(--coral-light); }

    .dock-tip {
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: #1a2640;
      color: var(--text-hi);
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 0.5px solid rgba(255,255,255,0.1);
      z-index: 9999;
    }
    .dock-btn:hover .dock-tip { opacity: 1; }

    .dock-div {
      width: 22px;
      height: 0.5px;
      background: var(--border);
      margin: 6px 0;
    }
    .dock-spacer { flex: 1; }

    #panel {
      width: var(--panel-w);
      background: var(--bg-panel);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.25s cubic-bezier(.4,0,.2,1);
      z-index: 400;
    }
    #panel.closed { width: 0; }

    .panel-head {
      padding: 22px 20px 16px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .panel-head-title {
      color: var(--text-hi);
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 8px;
      white-space: nowrap;
    }
    .panel-head-sub {
      color: var(--text-lo);
      font-size: 0.875rem;
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
    }

    .panel-body {
      padding: 16px 18px;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .stat-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .stat-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .stat-label { color: var(--text-lo); font-size: 1rem; margin-bottom: 10px; white-space: nowrap; }
    .stat-val {
      color: var(--text-hi);
      font-size: 2rem;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      line-height: 1;
    }
    .stat-unit { font-size: 1rem; color: var(--text-mid); font-weight: 400; margin-left: 4px; }

    .block {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .block-label {
      color: var(--text-lo);
      font-size: 1rem;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-name { color: var(--text-mid); font-size: 0.9375rem; width: 48px; flex-shrink: 0; text-align: right; white-space: nowrap; }
    .bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .bar-num { color: var(--text-lo); font-size: 0.9375rem; font-family: 'DM Mono', monospace; width: 28px; text-align: right; }

    .lrow { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
    .lrow:last-child { margin-bottom: 0; }
    .lswatch { width: 36px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .ltxt { color: var(--text-mid); font-size: 0.9375rem; font-family: 'DM Mono', monospace; }

    .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .layer-left { display: flex; align-items: center; gap: 12px; }
    .layer-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .layer-name { color: var(--text-mid); font-size: 1rem; white-space: nowrap; }

    .tog {
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: var(--coral);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      border: none;
    }
    .tog::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      right: 2px;
      transition: right 0.2s, left 0.2s;
    }
    .tog.off { background: rgba(255,255,255,0.12); }
    .tog.off::after { right: auto; left: 2px; }

    #map-wrap { flex: 1; position: relative; overflow: hidden; z-index: 1; }
    #map { width: 100%; height: 100%; }

    .leaflet-control { box-shadow: none !important; }
    .leaflet-bar { background: transparent !important; border: none !important; }
    .leaflet-bar a {
      background: rgba(12,22,40,0.88) !important;
      color: var(--text-hi) !important;
      border: 0.5px solid var(--border) !important;
      width: 28px !important;
      height: 28px !important;
      line-height: 28px !important;
      font-size: 16px !important;
    }
    .leaflet-bar a:hover { background: rgba(20,36,60,0.95) !important; }
    .leaflet-control-zoom { margin: 14px !important; }

    #topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: rgba(8,16,30,0.65);
      border-bottom: 0.5px solid var(--border);
      z-index: 300;
      pointer-events: none;
    }
    .topbar-title {
      color: var(--text-hi);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--coral);
    }
    .topbar-meta {
      color: var(--text-lo);
      font-size: 10px;
      font-family: 'DM Mono', monospace;
    }

    #hex-tooltip {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12,22,40,0.92);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      color: var(--text-hi);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      z-index: 400;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #hex-tooltip.show { opacity: 1; }

    #inc-fab {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--coral);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 9px 18px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #inc-fab:hover { background: #c04e26; }
    #inc-fab svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2; fill: none; }

    #inc-dialog {
      position: absolute;
      bottom: 62px;
      left: 50%;
      transform: translateX(-50%);
      width: min(320px, 90vw);
      background: rgba(10,18,32,0.96);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      z-index: 500;
      overflow: hidden;
      display: none;
    }
    #inc-dialog.show { display: block; }

    .dlg-head {
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dlg-head-title { color: var(--text-hi); font-size: 12px; font-weight: 500; }
    .dlg-close {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid var(--border);
      color: var(--text-mid);
      border-radius: 7px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
    }

    .dlg-body { padding: 12px; display: flex; flex-direction: column; gap: 9px; }

    .dlg-status {
      font-size: 11px;
      color: var(--text-mid);
      padding: 6px 9px;
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 7px;
      font-family: 'DM Mono', monospace;
    }
    .dlg-status.ok { color: #7bcfa1; }
    .dlg-status.err { color: var(--coral-light); }

    .dlg-field { display: flex; flex-direction: column; gap: 5px; }
    .dlg-field label { color: var(--text-lo); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
    .dlg-field select,
    .dlg-field textarea,
    .dlg-field input {
      background: rgba(0,0,0,0.35);
      border: 0.5px solid rgba(255,255,255,0.14);
      color: var(--text-hi);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
    }
    .dlg-field select option { background: #0c1628; }
    .dlg-field textarea { min-height: 72px; resize: vertical; }
    .dlg-field input:focus,
    .dlg-field select:focus,
    .dlg-field textarea:focus { border-color: rgba(216,90,48,0.5); }

    .dlg-actions { display: flex; gap: 7px; justify-content: flex-end; }
    .btn-sec {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border);
      color: var(--text-mid);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-pri {
      background: var(--coral);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-pri:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-pri:not(:disabled):hover { background: #c04e26; }

    .inc-section { display: flex; flex-direction: column; gap: 9px; }
    .inc-section.hidden { display: none; }
  </style>
</head>
<body>
<div id="shell">
  <nav id="dock" aria-label="主導覽">
    <div class="dock-logo" aria-hidden="true">
      <svg viewBox="0 0 16 16"><polygon points="8,1 15,5 15,11 8,15 1,11 1,5"/></svg>
    </div>

    <button class="dock-btn active" id="btnPanel" aria-label="數據面板">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/><rect x="14" y="17" width="7" height="4" rx="1"/>
      </svg>
      <span class="dock-tip">數據面板</span>
    </button>

    <div class="dock-div"></div>

    <button class="dock-btn" id="btnReport" aria-label="回報事件">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span class="dock-tip">回報事件</span>
    </button>

    <div class="dock-spacer"></div>
    <div class="dock-div"></div>

    <button class="dock-btn" aria-label="設定">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span class="dock-tip">設定</span>
    </button>
  </nav>

  <aside id="panel" aria-label="數據面板">
    <div class="panel-head">
      <div class="panel-head-title">台大校園概況</div>
      <div class="panel-head-sub">NTU Campus · Live</div>
    </div>
    <div class="panel-body">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">回報事件</div>
          <div class="stat-val" id="stat-incident-count">0<span class="stat-unit">件</span></div>
        </div>
      </div>

      <div class="block">
        <div class="block-label">事件類型分佈</div>
        <div class="bar-row">
          <span class="bar-name">事故</span>
          <div class="bar-track"><div class="bar-fill" id="bar-accident" style="width:0%;background:#F0997B;"></div></div>
          <span class="bar-num" id="bar-accident-num">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">騷擾</span>
          <div class="bar-track"><div class="bar-fill" id="bar-harassment" style="width:0%;background:#ef718d;"></div></div>
          <span class="bar-num" id="bar-harassment-num">0</span>
        </div>
      </div>

      <div class="block">
        <div class="block-label">亮度圖例（lux）</div>
        <div class="lrow"><span class="lswatch" style="background:#0b1020;"></span><span class="ltxt">0 - 1</span></div>
        <div class="lrow"><span class="lswatch" style="background:#1f2a5a;"></span><span class="ltxt">1 - 12</span></div>
        <div class="lrow"><span class="lswatch" style="background:#2f6f9f;"></span><span class="ltxt">12 - 29</span></div>
        <div class="lrow"><span class="lswatch" style="background:#6fd0c2;"></span><span class="ltxt">29 - 54</span></div>
        <div class="lrow"><span class="lswatch" style="background:#f3f6ff;"></span><span class="ltxt">54 +</span></div>
      </div>

      <div class="block">
        <div class="block-label">圖層</div>
        <div class="layer-item">
          <div class="layer-left">
            <span class="layer-dot" style="background:#f3f6ff;"></span>
            <span class="layer-name">實測亮度</span>
          </div>
          <button class="tog" id="tog-brightness" aria-label="切換實測亮度圖層"></button>
        </div>
        <div class="layer-item">
          <div class="layer-left">
            <span class="layer-dot" style="background:#7bcfa1;"></span>
            <span class="layer-name">道路安全框線</span>
          </div>
          <button class="tog" id="tog-safety" aria-label="切換道路安全圖層"></button>
        </div>
        <div class="layer-item">
          <div class="layer-left">
            <span class="layer-dot" style="background:#D85A30;"></span>
            <span class="layer-name">安全事件</span>
          </div>
          <button class="tog" id="tog-incident" aria-label="切換安全事件圖層"></button>
        </div>
        <div class="layer-item">
          <div class="layer-left">
            <span class="layer-dot" style="background:#b79af5;"></span>
            <span class="layer-name">光害控制區</span>
          </div>
          <button class="tog" id="tog-protect" aria-label="切換光害控制區圖層"></button>
        </div>
      </div>
    </div>
  </aside>

  <div id="map-wrap">
    <div id="topbar" aria-hidden="true">
      <div class="topbar-title">
        <span class="topbar-dot"></span>
        台大夜間亮度地圖
      </div>
      <div class="topbar-meta">NTU Campus</div>
    </div>

    <div id="hex-tooltip" role="status" aria-live="polite"></div>
    <div id="map"></div>

    <button id="inc-fab" aria-label="回報安全事件">
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      回報安全事件
    </button>

    <div id="inc-dialog" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
      <div class="dlg-head">
        <span class="dlg-head-title" id="dlg-title">新增安全事件</span>
        <button class="dlg-close" id="dlg-close" aria-label="關閉">×</button>
      </div>
      <div class="dlg-body">
        <div class="inc-section" id="auth-section">
          <div class="dlg-status" id="auth-status">請使用 NTU email 驗證後回報</div>
          <div class="dlg-field">
            <label for="auth-email">NTU Email</label>
            <input id="auth-email" type="email" placeholder="name@ntu.edu.tw" autocomplete="email"/>
          </div>
          <div class="dlg-actions">
            <button class="btn-pri" id="btn-request-code">寄送驗證碼</button>
          </div>
          <div class="dlg-field">
            <label for="auth-code">驗證碼</label>
            <input id="auth-code" inputmode="numeric" maxlength="6" placeholder="6 位數字" autocomplete="one-time-code"/>
          </div>
          <div class="dlg-actions">
            <button class="btn-pri" id="btn-verify-code">驗證</button>
          </div>
        </div>

        <div class="inc-section hidden" id="report-section">
          <div class="dlg-status" id="report-status">請在地圖上點選回報區</div>
          <div class="dlg-field">
            <label for="inc-type">事件類型</label>
            <select id="inc-type" required>
              <option value="accident">事故</option>
              <option value="harassment">騷擾</option>
            </select>
          </div>
          <div class="dlg-field">
            <label for="inc-desc">描述</label>
            <textarea id="inc-desc" maxlength="300" required placeholder="請描述事件情況..."></textarea>
          </div>
          <div class="dlg-actions">
            <button class="btn-sec" id="btn-cancel">取消</button>
            <button class="btn-pri" id="btn-submit" disabled>送出</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([25.0173, 121.5398], 16);

map.createPane('brightnessPane'); map.getPane('brightnessPane').style.zIndex = 350;
map.createPane('safetyPane');     map.getPane('safetyPane').style.zIndex = 300;
map.createPane('protectPane');    map.getPane('protectPane').style.zIndex = 250;
map.createPane('incidentPane');   map.getPane('incidentPane').style.zIndex = 400;

const ASSET_BASE = location.pathname.startsWith('/ntu_light_map/') ? '/ntu_light_map' : '';
const assetUrl = path => `${ASSET_BASE}${path}`;

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

const panel = document.getElementById('panel');
const btnPanel = document.getElementById('btnPanel');
const btnReport = document.getElementById('btnReport');

btnPanel.addEventListener('click', () => {
  const closed = panel.classList.toggle('closed');
  btnPanel.classList.toggle('active', !closed);
});

const layerMap = {};

function makeToggle(id, layerKey) {
  const btn = document.getElementById(id);
  btn.addEventListener('click', () => {
    btn.classList.toggle('off');
    const layer = layerMap[layerKey];
    if (!layer) return;
    if (btn.classList.contains('off')) map.removeLayer(layer);
    else layer.addTo(map);
  });
}

makeToggle('tog-brightness', 'brightness');
makeToggle('tog-safety', 'safety');
makeToggle('tog-incident', 'incident');
makeToggle('tog-protect', 'protect');

const incidentTypeMeta = {
  accident: { label: '事故', color: '#F0997B' },
  harassment: { label: '騷擾', color: '#ef718d' }
};

const incidentHexLayer = L.layerGroup().addTo(map);
layerMap.incident = incidentHexLayer;

let authSession = null;
let reportHexLayer = null;
let selectedHexLayer = null;
let selectedHex = null;
let allIncidents = [];
const reportHexFeatureById = new Map();

const incFab = document.getElementById('inc-fab');
const incDialog = document.getElementById('inc-dialog');
const dlgClose = document.getElementById('dlg-close');
const authSec = document.getElementById('auth-section');
const reportSec = document.getElementById('report-section');
const authStatus = document.getElementById('auth-status');
const reportStatus = document.getElementById('report-status');
const authEmail = document.getElementById('auth-email');
const authCode = document.getElementById('auth-code');
const btnRequestCode = document.getElementById('btn-request-code');
const btnVerifyCode = document.getElementById('btn-verify-code');
const incType = document.getElementById('inc-type');
const incDesc = document.getElementById('inc-desc');
const btnSubmit = document.getElementById('btn-submit');
const btnCancel = document.getElementById('btn-cancel');
const hexTooltip = document.getElementById('hex-tooltip');

btnReport.addEventListener('click', () => {
  btnReport.classList.toggle('active');
  beginIncidentFlow();
});

function setStatus(el, message, state = '') {
  el.textContent = message;
  el.className = `dlg-status ${state}`.trim();
}

function showAuth() {
  authSec.classList.remove('hidden');
  reportSec.classList.add('hidden');
  if (reportHexLayer && map.hasLayer(reportHexLayer)) map.removeLayer(reportHexLayer);
}

function showReport() {
  authSec.classList.add('hidden');
  reportSec.classList.remove('hidden');
  if (reportHexLayer && !map.hasLayer(reportHexLayer)) reportHexLayer.addTo(map);
}

function closeDialog() {
  incDialog.classList.remove('show');
  btnReport.classList.remove('active');
  authSec.classList.remove('hidden');
  reportSec.classList.add('hidden');
  selectedHex = null;
  incDesc.value = '';
  authCode.value = '';
  btnSubmit.disabled = true;
  setStatus(reportStatus, '請在地圖上點選回報區');
  if (selectedHexLayer) {
    selectedHexLayer.remove();
    selectedHexLayer = null;
  }
  if (reportHexLayer && map.hasLayer(reportHexLayer)) map.removeLayer(reportHexLayer);
}

function updateSubmitState() {
  btnSubmit.disabled = !selectedHex || incDesc.value.trim().length === 0;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[char]);
}

function incidentLabel(type) {
  return incidentTypeMeta[type]?.label || incidentTypeMeta.accident.label;
}

function incidentColor(type) {
  return incidentTypeMeta[type]?.color || incidentTypeMeta.accident.color;
}

function updateStatsPanel() {
  const total = allIncidents.length;
  const accidentCount = allIncidents.filter(incident => incident.type === 'accident').length;
  const harassmentCount = allIncidents.filter(incident => incident.type === 'harassment').length;
  const maxCount = Math.max(accidentCount, harassmentCount, 1);

  document.getElementById('stat-incident-count').innerHTML =
    `${total}<span class="stat-unit">件</span>`;
  document.getElementById('bar-accident').style.width =
    `${Math.round(accidentCount / maxCount * 100)}%`;
  document.getElementById('bar-accident-num').textContent = accidentCount;
  document.getElementById('bar-harassment').style.width =
    `${Math.round(harassmentCount / maxCount * 100)}%`;
  document.getElementById('bar-harassment-num').textContent = harassmentCount;
}

function renderIncidents() {
  incidentHexLayer.clearLayers();
  const grouped = new Map();

  allIncidents.forEach(incident => {
    const key = Number(incident.report_hex_id);
    if (!Number.isInteger(key)) return;
    const list = grouped.get(key) || [];
    list.push(incident);
    grouped.set(key, list);
  });

  grouped.forEach((incidents, reportHexId) => {
    const feature = reportHexFeatureById.get(reportHexId);
    if (!feature) return;

    const latest = incidents[0];
    const color = incidentColor(latest.type);
    const rows = incidents.slice(0, 5).map(incident => `
      <div style="border-top:1px solid rgba(15,23,42,.12); padding-top:5px; margin-top:5px;">
        <b>${escapeHtml(incidentLabel(incident.type))}</b><br/>
        ${escapeHtml(incident.description)}<br/>
        <span style="color:#64748b;">${escapeHtml(incident.created_at)}</span>
      </div>
    `).join('');

    const layer = L.geoJSON(feature, {
      pane: 'incidentPane',
      style: {
        color,
        weight: 1.4,
        opacity: 0.95,
        fillColor: color,
        fillOpacity: Math.min(0.62, 0.28 + incidents.length * 0.08)
      }
    });

    layer.bindPopup(`
      <div style="font:12px/1.5 system-ui,sans-serif; min-width:180px;">
        <b>回報區 ${reportHexId}</b><br/>
        回報數：${incidents.length}
        ${rows}
      </div>
    `);
    incidentHexLayer.addLayer(layer);
  });

  updateStatsPanel();
}

function selectReportHex(feature, layer) {
  const id = Number(feature.properties?.id);
  if (!Number.isInteger(id)) return;

  selectedHex = { id, center: layer.getBounds().getCenter(), feature };
  if (selectedHexLayer) selectedHexLayer.remove();

  selectedHexLayer = L.geoJSON(feature, {
    pane: 'incidentPane',
    interactive: false,
    style: {
      color: '#F0997B',
      weight: 2.5,
      opacity: 1,
      fillColor: '#D85A30',
      fillOpacity: 0.35
    }
  }).addTo(map);

  setStatus(reportStatus, `已選回報區 ${id}`, 'ok');
  updateSubmitState();
}

async function loadJSON(url) {
  const response = await fetch(url);
  return response.json();
}

async function loadIncidents() {
  const response = await fetch('/api/incidents', { headers: { accept: 'application/json' } });
  if (!response.ok) return;
  const data = await response.json();
  allIncidents = Array.isArray(data.incidents) ? data.incidents : [];
  renderIncidents();
}

async function loadReportHexes() {
  const geo = await loadJSON(assetUrl('/data/report_hex_4326.geojson'));
  geo.features.forEach(feature => {
    const id = Number(feature.properties?.id);
    if (Number.isInteger(id)) reportHexFeatureById.set(id, feature);
  });

  reportHexLayer = L.geoJSON(geo, {
    pane: 'incidentPane',
    style: {
      color: '#cbd5e1',
      weight: 0.55,
      opacity: 0.28,
      fillColor: '#cbd5e1',
      fillOpacity: 0.01
    },
    onEachFeature: (feature, layer) => {
      layer.on('click', () => selectReportHex(feature, layer));
      layer.on('mouseover', () => layer.setStyle({ opacity: 0.7, fillOpacity: 0.08, weight: 1 }));
      layer.on('mouseout', () => layer.setStyle({ opacity: 0.28, fillOpacity: 0.01, weight: 0.55 }));
    }
  });

  await loadIncidents();
}

async function getAuthSession() {
  try {
    const response = await fetch('/api/protected/session', {
      headers: { accept: 'application/json' }
    });
    if (!response.ok) return null;
    return response.json();
  } catch {
    return null;
  }
}

async function beginIncidentFlow() {
  if (incDialog.classList.contains('show')) {
    closeDialog();
    return;
  }
  authSession = authSession || await getAuthSession();
  incDialog.classList.add('show');
  btnReport.classList.add('active');
  if (authSession?.authenticated) showReport();
  else showAuth();
}

incFab.addEventListener('click', beginIncidentFlow);
dlgClose.addEventListener('click', closeDialog);
btnCancel.addEventListener('click', closeDialog);
incDesc.addEventListener('input', updateSubmitState);

btnRequestCode.addEventListener('click', async () => {
  const email = authEmail.value.trim().toLowerCase();
  if (!email.endsWith('@ntu.edu.tw')) {
    setStatus(authStatus, '請輸入 @ntu.edu.tw email', 'err');
    return;
  }

  btnRequestCode.disabled = true;
  setStatus(authStatus, '寄送中');

  try {
    const response = await fetch('/api/auth/request-code', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        accept: 'application/json'
      },
      body: JSON.stringify({ email })
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      setStatus(authStatus, errorData.message || errorData.error || '寄送失敗', 'err');
      return;
    }

    setStatus(authStatus, '驗證碼已寄出，請檢查信箱', 'ok');
    authCode.focus();
  } catch {
    setStatus(authStatus, '寄送失敗', 'err');
  } finally {
    btnRequestCode.disabled = false;
  }
});

btnVerifyCode.addEventListener('click', async () => {
  const email = authEmail.value.trim().toLowerCase();
  const code = authCode.value.trim();
  if (!email.endsWith('@ntu.edu.tw') || !/^\d{6}$/.test(code)) {
    setStatus(authStatus, '請輸入 NTU email 與 6 位數驗證碼', 'err');
    return;
  }

  btnVerifyCode.disabled = true;
  setStatus(authStatus, '驗證中');

  try {
    const response = await fetch('/api/auth/verify-code', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        accept: 'application/json'
      },
      body: JSON.stringify({ email, code })
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      setStatus(authStatus, errorData.message || errorData.error || '驗證失敗', 'err');
      return;
    }

    authSession = await response.json();
    setStatus(authStatus, '驗證完成', 'ok');
    showReport();
    setStatus(reportStatus, '請在地圖上點選回報區');
  } catch {
    setStatus(authStatus, '驗證失敗', 'err');
  } finally {
    btnVerifyCode.disabled = false;
  }
});

btnSubmit.addEventListener('click', async () => {
  if (reportSec.classList.contains('hidden')) return;
  if (!selectedHex) {
    setStatus(reportStatus, '請先點選回報區', 'err');
    return;
  }

  btnSubmit.disabled = true;
  setStatus(reportStatus, '送出中');

  try {
    const response = await fetch('/api/protected/incidents', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        accept: 'application/json'
      },
      body: JSON.stringify({
        report_hex_id: selectedHex.id,
        lat: selectedHex.center.lat,
        lng: selectedHex.center.lng,
        type: incType.value,
        description: incDesc.value.trim()
      })
    });

    if (response.status === 401 || response.status === 403) {
      authSession = null;
      showAuth();
      setStatus(authStatus, '請先完成 NTU email 驗證', 'err');
      return;
    }
    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      setStatus(reportStatus, errorData.message || errorData.error || '送出失敗', 'err');
      updateSubmitState();
      return;
    }

    const data = await response.json();
    if (data.incident) {
      allIncidents.unshift(data.incident);
      renderIncidents();
    }
    closeDialog();
  } catch {
    setStatus(reportStatus, '送出失敗', 'err');
    updateSubmitState();
  }
});

fetch(assetUrl('/data/ntu_area.geojson'))
  .then(response => response.json())
  .then(geo => {
    const ntuLine = L.geoJSON(geo, {
      style: { color: '#eef2f7', weight: 1.05, opacity: 0.9 }
    }).addTo(map);
    map.fitBounds(ntuLine.getBounds());
  });

(async () => {
  const geoBrightness = await loadJSON(assetUrl('/data/merge_sur_zhoushan.geojson'));
  const rawVals = geoBrightness.features
    .map(feature => Number(feature.properties?.brightness_filled))
    .filter(value => Number.isFinite(value) && value >= 0);

  if (!rawVals.length) return;

  const above = rawVals.filter(value => value > 1).sort((a, b) => a - b);
  const quantile = (arr, p) => {
    if (!arr.length) return 1;
    const pos = (arr.length - 1) * p;
    const base = Math.floor(pos);
    return base + 1 < arr.length ? arr[base] + (pos - base) * (arr[base + 1] - arr[base]) : arr[base];
  };
  const [q25, q50, q75] = [0.25, 0.50, 0.75].map(p => quantile(above, p));
  const ramp = ['#0b1020', '#1f2a5a', '#2f6f9f', '#6fd0c2', '#f3f6ff'];
  const getColor = value => !Number.isFinite(value)
    ? '#7b8492'
    : value <= 1 ? ramp[0]
    : value <= q25 ? ramp[1]
    : value <= q50 ? ramp[2]
    : value <= q75 ? ramp[3]
    : ramp[4];

  const brightLayer = L.geoJSON(geoBrightness, {
    pane: 'brightnessPane',
    style: feature => ({
      color: 'rgba(6,10,18,.55)',
      weight: 0.25,
      fillColor: getColor(Number(feature.properties?.brightness_filled)),
      fillOpacity: 0.9
    }),
    onEachFeature: (feature, layer) => {
      const value = Number(feature.properties?.brightness_filled);
      const id = feature.properties?.id ?? '-';
      layer.on('mouseover', () => {
        hexTooltip.textContent = `Hex ${id}  ·  ${Number.isFinite(value) ? value.toFixed(2) : 'N/A'} lux`;
        hexTooltip.classList.add('show');
      });
      layer.on('mouseout', () => hexTooltip.classList.remove('show'));
      layer.bindPopup(`<div style="font:12px/1.5 system-ui;min-width:120px;"><b style="font-size:13px">Hex ${escapeHtml(String(id))}</b><br><span style="background:#f1f5fb;padding:3px 6px;border-radius:5px;display:inline-block;margin-top:4px;">${Number.isFinite(value) ? value.toFixed(2) : 'N/A'} lux</span></div>`);
    }
  }).addTo(map);
  layerMap.brightness = brightLayer;

  const geoSafety = await loadJSON(assetUrl('/data/hex_hit_with_safe.geojson'));
  const safeColor = score => score === 1 ? '#7bcfa1' : score === 2 ? '#e6c07a' : score === 3 ? '#e08a8a' : '#8aa2d6';
  const safetyLayer = L.geoJSON(geoSafety, {
    pane: 'safetyPane',
    style: feature => ({
      color: safeColor(Number(feature.properties?.safe_worst)),
      weight: 1.05,
      opacity: 0.9,
      fillOpacity: 0,
      fill: false
    }),
    onEachFeature: (feature, layer) => {
      const id = feature.properties?.id ?? '-';
      layer.bindPopup(`<div style="font:12px/1.5 system-ui;"><b>Hex ${escapeHtml(String(id))}</b><br>safe_worst: ${feature.properties?.safe_worst}<br>safe_mean: ${feature.properties?.safe_mean != null ? Number(feature.properties.safe_mean).toFixed(2) : 'N/A'}</div>`);
    }
  }).addTo(map);
  layerMap.safety = safetyLayer;

  const geoProtect = await loadJSON(assetUrl('/data/protect_square_4326.geojson'));
  const protectLayer = L.geoJSON(geoProtect, {
    pane: 'protectPane',
    style: { color: '#b79af5', fillColor: '#b79af5', fillOpacity: 0.18, weight: 0 }
  }).addTo(map);
  layerMap.protect = protectLayer;

  await loadReportHexes();

  if (window.location.hash === '#new-incident') {
    history.replaceState(null, '', location.pathname + location.search);
    beginIncidentFlow();
  }
})();
</script>
